name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 SDK
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version
          sdk_major="$(xcrun --sdk macosx --show-sdk-version | cut -d. -f1)"
          test "$sdk_major" -ge 26

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  windows-artifact:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build Windows debug binary
        run: cargo build --target x86_64-pc-windows-msvc

      - name: Test Windows target
        run: cargo test --target x86_64-pc-windows-msvc

      - name: Stage Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/debug/shuo.exe dist/windows/shuo.exe
          Copy-Item docs/cross-platform/windows-runtime-validation.md dist/windows/windows-runtime-validation.md

      - name: Upload Windows debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: shuo-windows-debug
          path: dist/windows
          if-no-files-found: error
