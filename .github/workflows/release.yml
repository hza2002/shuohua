name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 创建 Release 需要

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode 26 SDK
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version
          sdk_major="$(xcrun --sdk macosx --show-sdk-version | cut -d. -f1)"
          test "$sdk_major" -ge 26

      - name: Install native build tools
        run: |
          missing=()
          command -v meson >/dev/null || missing+=(meson)
          command -v ninja >/dev/null || missing+=(ninja)
          if [ "${#missing[@]}" -gt 0 ]; then
            brew install "${missing[@]}"
          fi
          meson --version
          ninja --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(grep -E '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$tag" != "$ver" ]; then
            echo "ERROR: tag v$tag does not match Cargo.toml version $ver"
            exit 1
          fi
          echo "tag=$tag matches Cargo.toml"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: |
          cargo clean -p shuohua
          cargo build --release --locked

      - name: Verify macOS deployment target
        run: |
          vtool -show-build target/release/shuo | grep 'minos 15.0'
          helper="$(find target/release/build -path '*/out/apple_helper' -type f | head -1)"
          test -n "$helper"
          vtool -show-build "$helper" | grep 'minos 15.0'

      - name: Package tarball + sha256
        run: |
          ver="${GITHUB_REF_NAME#v}"
          name="shuo-v${ver}-aarch64-apple-darwin"
          mkdir -p "dist/${name}"
          cp target/release/shuo "dist/${name}/"
          cp LICENSE README.md README.en.md "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          (
            cd dist
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          )
          ls -lh dist/

      - name: Render release body
        run: |
          ver="${GITHUB_REF_NAME#v}"
          name="shuo-v${ver}-aarch64-apple-darwin"
          sed "s/shuo-\\*-aarch64-apple-darwin/${name}/g" \
            .github/release-body.md > dist/release-body.md
          python3 - "$ver" "$GITHUB_REF_NAME" <<'PY'
          import re
          import sys
          from pathlib import Path

          ver = sys.argv[1]
          tag = sys.argv[2]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^## v{re.escape(ver)}\b.*?(?=^## v|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(changelog)
          if not match:
              raise SystemExit(f"CHANGELOG.md is missing section for v{ver}")

          section = match.group(0).strip()
          heading = section.splitlines()[0].removeprefix("## ").strip()
          anchor = re.sub(r"[^a-z0-9 _-]", "", heading.lower()).replace(" ", "-")
          link = (
              f"https://github.com/hza2002/shuohua/blob/{tag}/"
              f"CHANGELOG.md#{anchor}"
          )
          body = Path("dist/release-body.md").read_text(encoding="utf-8")
          body = body.replace(
              "<!-- CHANGELOG_SECTION -->",
              f"{section}\n\n[查看 CHANGELOG 中的本版本段落]({link})",
          )
          Path("dist/release-body.md").write_text(body, encoding="utf-8")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          body_path: dist/release-body.md
          generate_release_notes: true
          fail_on_unmatched_files: true
