# Doubao SAUC bigmodel_async (火山引擎大模型流式语音识别)
# 控制台: https://console.volcengine.com/speech
# 协议:   https://www.volcengine.com/docs/6561/1354869

# 鉴权（去控制台拿）
app_key     = ""    # X-Api-App-Key
access_key  = ""    # X-Api-Access-Key
resource_id = "volc.bigasr.sauc.duration"   # 按时长计费的大模型流式版

# 语言。留空 = bigmodel_async 自动中英混合识别（推荐）。
# 强制单语：填 "zh-CN" / "en-US" 等
# language = "zh-CN"

# 服务端识别行为
enable_itn  = true       # 数字归一化：一九七零 → 1970
enable_punc = true       # 自动加标点
enable_ddc  = false      # 服务端去口语词。我们 PostProcessor 自己做，关掉
