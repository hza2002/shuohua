<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shuohua</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: Canvas;
        color: CanvasText;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        font-weight: 650;
      }

      dl {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 8px 16px;
        margin: 0;
        font-size: 14px;
      }

      dt {
        color: color-mix(in srgb, CanvasText 62%, Canvas);
      }

      dd {
        margin: 0;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Shuohua</h1>
      <dl>
        <dt>Phase</dt>
        <dd id="phase">Phase 9n</dd>
        <dt>Daemon connected</dt>
        <dd id="daemon-connected">false</dd>
        <dt>Placeholder ready</dt>
        <dd id="placeholder-ready">true</dd>
        <dt>Request plan</dt>
        <dd id="request-plan-count">0 commands</dd>
        <dt>Request kinds</dt>
        <dd id="request-plan-kinds">pending</dd>
        <dt>Requires daemon</dt>
        <dd id="request-plan-requires-daemon">true</dd>
        <dt>Transport opened</dt>
        <dd id="request-plan-transport-opened">false</dd>
      </dl>
    </main>
    <script>
      async function loadShellMetadata() {
        const invoke = window.__TAURI__?.core?.invoke;
        if (!invoke) {
          return;
        }

        const metadata = await invoke("gui_shell_metadata");
        document.getElementById("phase").textContent = metadata.phase;
        document.getElementById("daemon-connected").textContent = String(
          metadata.daemonConnected
        );
        document.getElementById("placeholder-ready").textContent = String(
          metadata.placeholderReady
        );

        const requestPlan = await invoke("gui_first_screen_request_plan", {
          historyLimit: 20,
        });
        document.getElementById("request-plan-count").textContent =
          `${requestPlan.commands.length} commands`;
        document.getElementById("request-plan-kinds").textContent =
          requestPlan.commands.map((command) => command.kind).join(", ");
        document.getElementById("request-plan-requires-daemon").textContent =
          String(requestPlan.requiresDaemonConnection);
        document.getElementById("request-plan-transport-opened").textContent =
          String(requestPlan.transportOpened);
      }

      loadShellMetadata().catch(() => {});
    </script>
  </body>
</html>
