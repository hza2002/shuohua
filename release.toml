# cargo-release 配置：纪律 > 灵活
# 文档：https://github.com/crate-ci/cargo-release/blob/master/docs/reference.md

# release commit 先通过 PR 进入 main
allow-branch = ["release/*"]

# release 分支上的版本 commit 仍由用户签名
sign-commit = true

# tag 在 release PR 合并后从 main 单独签名创建
tag = false

# 不发到 crates.io（项目 Cargo.toml 已 publish = false，这里再保险）
publish = false

# release 分支由用户显式 push，cargo-release 不接触远端
push = false

# commit message
pre-release-commit-message = "release: v{{version}}"

# 发版前必须通过：fmt 检查、clippy 零警告、全量 test
# 任何一项失败都停下，不进入 bump/commit/tag/push 阶段
pre-release-hook = [
  "sh",
  "-c",
  "rustup update stable && rustup component add --toolchain stable clippy rustfmt && cargo +stable fmt --check && cargo +stable clippy --locked --all-targets -- -D warnings && cargo +stable test --locked",
]
